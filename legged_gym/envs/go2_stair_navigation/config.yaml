terrain:
  terrain_choice: 2

targets:
  # cmd_local = [x_local, y_local, heading_deg]
  # world cmd used by obs/reward is: [x_local + env_origin_x, y_local + env_origin_y, heading]
  # true: random sample target cmd from command_ranges (x, y, heading)
  # false: cycle through target_cmd_list
  auto_sample_targets: false
  target_cmd_list:
    - [10.0, 0.0, 0.0]
    - [10.0, 10.0, 90.0]
    - [0.0, 10.0, 180.0]
    - [0.0, 0.0, -90.0]
  switch_on_reach: true
  target_reach_radius: 0.2
  target_switch_interval_s: 0.0  # 超过多少时间强制更新，0表示不强制更新
  target_x_range: [-10.0, 10.0]
  target_y_range: [-10.0, 10.0]

rewards:  # TODO 用到了吗
  tracking_xy_scale: 1.0
  tracking_ang_vel: 0.5
  speed_scale: 0.2
  tracking_xy_sigma: 0.25
  tracking_ang_vel_sigma: 0.25
  max_speed_reward: 2.0
