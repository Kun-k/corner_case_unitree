# Terrain configuration for TerrainChanger and TerrainTrainer
# Parameters here are used to map normalized action outputs [-1,1] to world/grid values

# forward distance range from robot base to bump center (meters)
min_forward_dist: 0.6
max_forward_dist: 0.12
# maximum lateral offset in meters
max_lateral: 0.3
# radius scaling (meters)
radius_min: 0.0
radius_max: 0.8
# maximum absolute bump height in meters (height output is in [-1,1] -> scaled to [-max_height, max_height])
max_bump_height: 0.1
# safety: minimum distance from robot base to bump center where terrain won't be changed (meters)
no_change_radius: 0.4

terrain_decimation: 10
terrain_types: ["bump"]

render: False
lock_camera: True
realtime_sim: False

# reward
# ===== 摔倒 =====
fall_height_threshold: 0.15
fall_angle_threshold: 1.3
fall_reward: 10.0

# ===== 碰撞 =====
collision_force_threshold: 80.0
collision_reward: 0.0
base_collision_reward: 6.0
thigh_collision_reward: 2.0

# ===== 失稳 =====
tilt_reward_scale: 0.0

# ===== 速度惩罚 =====
target_speed: 0.5
speed_reward_scale: 0.0
stuck_speed_threshold: 0.05
stuck_reward: 4.0

# ===== 终止 =====
terminate_on_fall: True
terminate_on_base_collision: False

repeat_reward: False
