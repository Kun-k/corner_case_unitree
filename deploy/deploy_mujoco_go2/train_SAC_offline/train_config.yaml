go2_task: "terrain"
go2_config: "go2.yaml"
terrain_config: "terrain_config.yaml"

# Offline-only training budget (number of optimization updates)
total_updates: 3000
gradient_steps_per_update: 1
max_episode_steps: 35

# Device / Torch runtime
device: "cuda:0"
seed: 0
torch_deterministic: false
cudnn_benchmark: true
allow_tf32: true
torch_num_threads: 0

# SAC hyperparameters
learning_rate: 0.0003
batch_size: 256
buffer_size: 1000000
tau: 0.005
gamma: 0.99

# Optional warm-start
preload_model_path: ""

# Offline data paths (dirs or .pkl files)
offline_pkl_paths:
  - "../train_SAC/eval_logs/random_eval_0311-1"
  - "../train_SAC/eval_logs/random_eval_0311-2"
  - "../train_SAC/eval_logs/random_eval_0311-3"
  - "../train_SAC/eval_logs/random_eval_0311-4"
  - "../train_SAC/eval_logs/random_eval_0311-5"
  - "../train_SAC/eval_logs/random_eval_0311-6"
  - "../train_SAC/eval_logs/random_eval_0311-7"
  - "../train_SAC/eval_logs/random_eval_0311-8"
#  - "../train_SAC/eval_logs/random_eval_0317-1"
#  - "../train_SAC/eval_logs/random_eval_0317-2"
#  - "../train_SAC/eval_logs/random_eval_0317-3"
#  - "../train_SAC/eval_logs/random_eval_0317-4"
#  - "../train_SAC/eval_logs/random_eval_0317-5"
#  - "../train_SAC/eval_logs/random_eval_0317-6"
#  - "../train_SAC/eval_logs/random_eval_0317-7"

# Keep first K frames in each consecutive fail+stuck run (0 = no trim)
consecutive_fail_keep_k: 1

# If true, reward is recomputed from transition info + terrain_config reward fields
reward_recompute: true

# Logging / checkpoints
log_every_updates: 100
checkpoint_every_updates: 100

# Periodic simulation evaluation during offline updates
eval_enabled: true
eval_every_updates: 20
eval_episodes: 5
eval_max_episode_steps: 35
eval_deterministic: false
eval_render: false

log_name: "hhh0324_sac_offline"

# nohup python deploy/deploy_mujoco_go2/train_SAC_offline/train.py >nohup_hhh0324_sac_offline.out 2>&1 &
