# Plum-blossom test terrain config
min_forward_dist: 0.12
max_forward_dist: 0.6
max_lateral: 0.3
radius_min: 0.05
radius_max: 0.8
max_bump_height: 0.1
no_change_radius: 0.35
init_bump_radius_m: 0.2
foot_clearance_m: 0.05

terrain_decimation: 10
terrain_types: ["bump"]

render: True
lock_camera: True
realtime_sim: True

fall_height_threshold: 0.12
fall_angle_threshold: 1.3
fall_reward: 10.0

collision_force_threshold: 80.0
collision_reward: 0.0
base_collision_reward: 6.0
thigh_collision_reward: 2.0

tilt_reward_scale: 0.0
target_speed: 0.5
speed_reward_scale: 0.0
stuck_speed_threshold: 0.05
stuck_reward: 2.0

terminate_on_fall: True
terminate_on_base_collision: False
terminate_on_terrain_edge: False
terrain_edge_margin: 0.05
repeat_reward: False

observation:
  include_last_action: true
  include_foot_contacts: true
  contact_force_threshold: 1.0
  local_height_map:
    enabled: true
    size_m: 1.0
    resolution_m: 0.2

