go2_task: "terrain"
go2_config: "go2.yaml"
terrain_config: "terrain_config.yaml"

total_timesteps: 60000
max_episode_steps: 35

# Device / Torch runtime
# auto | cpu | cuda | cuda:0
device: "cuda:0"
seed: 0
torch_deterministic: false
cudnn_benchmark: true
allow_tf32: true
torch_num_threads: 0

# PPO hyperparameters
learning_rate: 0.0003
batch_size: 256
n_steps: 2048
n_epochs: 10
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.0
vf_coef: 0.5
max_grad_norm: 0.5

# Logging / plotting / checkpoint intervals
plot_save_every_steps: 2000
plot_smooth_window: 20
checkpoint_every_steps: 200

# Optional warm-start
preload_model_path: ""   # e.g. deploy/deploy_mujoco_go2/train_PPO/train_logs/xxx/model.zip

# Optional classifier gate for action source selection during training.
# If enabled: classifier score > threshold => use PPO action, else random action.
classifier_gate:
  enabled: true
  checkpoint_path: "../train_offline/train_logs/classifier_training_0313/classifier/checkpoint_epoch_310.pt"
  threshold: 0.55
  concat_action_to_obs: false
  hidden_dim: 128
  device: "cuda:3"

# Train-time failure recording
failure_pkl_name: "collision_failures.pkl"
failure_flush_every_episodes: 50

# Sampling-time/recording-time filter:
# keep only first K frames in each consecutive fail+stuck run.
# 0 means do not trim.
consecutive_fail_keep_k: 1

log_name: "ppo_0312"


# nohup python deploy/deploy_mujoco_go2/train_PPO_classifier/train.py >ppo_classifier_0312.out 2>&1 &
