log_name: "classifier_training_0313"
seed: 0
device: "cuda:3"  # auto | cpu | cuda | cuda:0

torch_deterministic: false
cudnn_benchmark: true
allow_tf32: true
torch_num_threads: 0

# Shared paths
logs_config: "logs_config.yaml"

# Reward config path for fail/reward recomputation.
# If terrain_config_path is set, it has higher priority.
terrain_config: "terrain_config.yaml"

classifier:
  concat_action_to_obs: False  # true: classifier input = obs + action, false: obs only
  # Mark failure frame and its previous k frames as positive labels.
  fail_preceding_k: 3
  val_split: 0.1
  test_split: 0.1
  epochs: 350
  batch_size: 512
  learning_rate: 0.0005
  hidden_dim: 128
  pos_weight: 1.3

  save_every_epochs: 10
  checkpoint_every_epochs: 10
  smooth_window: 10
