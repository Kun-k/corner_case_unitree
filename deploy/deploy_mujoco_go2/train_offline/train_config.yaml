log_name: "offline_0310"
seed: 0
device: "auto"  # auto | cpu | cuda | cuda:0

torch_deterministic: false
cudnn_benchmark: true
allow_tf32: true
torch_num_threads: 0

# Shared paths
logs_config: "logs_config.yaml"
terrain_config: "terrain_config.yaml"

ppo:
  epochs: 20000
  batch_size: 256
  minibatch_size: 128
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5

  save_every_epochs: 200
  checkpoint_every_epochs: 200
  smooth_window: 20

classifier:
  concat_action_to_obs: true  # true: classifier input = obs + action, false: obs only
  val_split: 0.1
  test_split: 0.1
  epochs: 2000
  batch_size: 256
  learning_rate: 0.0005
  hidden_dim: 256
  pos_weight: 2.0

  save_every_epochs: 5
  checkpoint_every_epochs: 10
  smooth_window: 10

eval:
  classifier_threshold: 0.55
  random_seed: 42
  sample_limit: 0  # 0 means all samples
  save_non_failure_trajectories: false

