policy_path: "deploy/pre_train/go2/terrain.pt"
xml_path: "deploy/deploy_mujoco_go2/robots/go2/scene_terrain.xml"

# Total simulation time
simulation_duration: 60.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 10 # 0.02
policy_decimation: 20
lock_camera: True

kps: [20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20]
kds: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]

default_angles: [0.1, 0.8, -1.5, -0.1, 0.8, -1.5,
                 0.1, 1.0, -1.5, -0.1, 1.0, -1.5]

lin_vel_scale: 2.0
ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [0.2, 0.2, 0.25]
num_actions: 12
num_obs: 48

init_skip_time: 2

navigation:
  mode: list  # list or random
  auto_switch: true

  # goal format: [x_world, y_world, heading_deg], world origin fixed at (0, 0)
  goal_list:
    - [2.0, 0.0, 0.0]
    - [2.0, 2.0, 90.0]
    - [0.0, 2.0, 180.0]
    - [0.0, 0.0, -90.0]

  # used when mode=random
  random_range:
    x: [-5.0, 5.0]  # xy与训练情况一致，参照训练的yaml配置文件
    y: [-5.0, 5.0]
    heading_deg: [-180.0, 180.0]  # 与训练一直，大部分情况固定

  switch_on_reach: true
  reach_threshold_xy: 0.2
  switch_interval_s: 0.0

  kp_pos: 1.0
  kp_heading: 0.8
  max_cmd_vx: 1.0
  max_cmd_vy: 1.0
  max_cmd_wz: 1.0

  heading_stiffness: 0.5

