go2_task: "terrain"
go2_config: "go2.yaml"
terrain_config: "terrain_config.yaml"

total_timesteps: 80000
max_episode_steps: 35

# Device / Torch runtime
# auto | cpu | cuda | cuda:0
device: "cuda:2"
seed: 0
torch_deterministic: false
cudnn_benchmark: true
allow_tf32: true
torch_num_threads: 0

# SAC-dense hyperparameters
learning_rate: 0.0003
batch_size: 256
buffer_size: 1000000
train_freq: 1
gradient_steps: 1
tau: 0.005
gamma: 0.99

# Dense replay filter threshold
reward_threshold: 8.0

# Non-finite obs clamp to avoid NaN propagation into actor
obs_abs_clip: 1000.0

# Plotting
# Save partial curves every N timesteps.
plot_save_every_steps: 2000
# Moving average window for reward smoothing.
plot_smooth_window: 20

# Checkpoint
# Save model checkpoint every N timesteps.
checkpoint_every_steps: 200

# Optional warm-starts
preload_model_path: ""
preload_pkl_paths: [
  "../train_SAC/eval_logs/random_eval_0311-1",
  "../train_SAC/eval_logs/random_eval_0311-2",
  "../train_SAC/eval_logs/random_eval_0311-3",
  "../train_SAC/eval_logs/random_eval_0311-4",
  "../train_SAC/eval_logs/random_eval_0311-5",
  "../train_SAC/eval_logs/random_eval_0311-6",
  "../train_SAC/eval_logs/random_eval_0311-7",
  "../train_SAC/eval_logs/random_eval_0311-8",
]

learning_starts: 0

dense_sample_ratio: 0

# Train-time failure recording
failure_pkl_name: "train_failure_chains.pkl"
failure_flush_every_episodes: 50

#log_name: "sac_dense_0312-preload-ratio70"
log_name: "sac_dense_0312-rew1-preload"

#nohup python deploy/deploy_mujoco_go2/train_SAC_dense/train.py >nohup_sac_dense_0312-rew1-preload.out 2>&1 &
#nohup python deploy/deploy_mujoco_go2/train_SAC_dense/train.py >debug.out 2>&1 &
