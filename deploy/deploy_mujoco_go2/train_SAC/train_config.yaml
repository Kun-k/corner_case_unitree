go2_task: "terrain"
go2_config: "go2.yaml"
terrain_config: "terrain_config.yaml"

total_timesteps: 60000
max_episode_steps: 350

# Device / Torch runtime
# auto | cpu | cuda | cuda:0
device: "cuda:0"
seed: 0
torch_deterministic: false
cudnn_benchmark: true
allow_tf32: true
torch_num_threads: 0

# SAC hyperparameters
learning_rate: 0.0003
batch_size: 256
buffer_size: 1000000
learning_starts: 100
train_freq: 1
gradient_steps: 1
tau: 0.005
gamma: 0.99

# Logging / plotting / checkpoint intervals
plot_save_every_steps: 2000
plot_smooth_window: 20
checkpoint_every_steps: 200

log_name: "sac_0310-rew2"

# nohup python deploy/deploy_mujoco_go2/train_SAC/train.py >nohup_sac_0310-rew2.out 2>&1 &
