
# 动态地形配置文件，可用于动态交互  后续摩擦等参数加在这里
terrain_action:
  terrain_types: ["bump"]

  # bump 圆心前向距离范围（米）
  min_forward_dist: 0.1
  max_forward_dist: 0.8

  # bump 横向偏移范围（米）
  max_lateral: 0.30

  # bump 半径范围（米）
  radius_min: 0.1
  radius_max: 0.5

  # bump 最大高度（米）
  max_bump_height: 0.1

  # 机器人附近地形不修改半径（米）
  no_change_radius: 0.4

  terrain_decimation: 20


# 可视化配置
visualization:
  render: True
  lock_camera: True
  realtime_sim: False


event_and_reward:
  # reward
  # ===== 摔倒 =====
  fall_height_threshold: 0.2
  fall_angle_threshold: 1.3
  fall_reward: 10.0

  # ===== 碰撞 =====
  collision_force_threshold: 80.0
  collision_reward: 0.0
  base_collision_reward: 6.0
  thigh_collision_reward: 2.0

  # ===== 失稳 =====
  tilt_reward_scale: 0.0

  # ===== 速度惩罚 =====
  target_speed: 0.5
  speed_reward_scale: 0.0
  stuck_speed_threshold: 0.05
  stuck_reward: 4.0

  repeat_reward: False


# 终止条件
termination:
  terminate_on_fall: True
  terminate_on_base_collision: False
  terminate_on_terrain_edge: True
  terrain_edge_margin: 1


# 训练观测值配置
observation:
  include_last_action: False
  include_foot_contacts: False
  contact_force_threshold: 1.0
  local_height_map:
    enabled: true
    size_m: 0.8
    resolution_m: 0.2
