policy: "random"  # random表示随机策略，其余情况下则查找训练好的模型
checkpoint: ""

#policy: "sac_0310-rew2"  # random表示随机策略，其余情况下则查找训练好的模型
#checkpoint: "checkpoint_step_22000"

go2_task: "terrain"
go2_config: "go2.yaml"
terrain_config: "terrain_config.yaml"

episodes: 200

max_episode_steps: 35
seed: 4

