log_name: "random_eval_0317-4"
#log_name: "sac_eval_0313-2"

use_curr_force: False  # 强制使用当前配置

render: False
save_non_failure_trajectories: False

classifier_gate:
  enabled: false
  checkpoint_path: "../train_offline/train_logs/offline_0312_hybrid_ppo/classifier/model_final.pt"
  threshold: 0.55
  concat_action_to_obs: true
  hidden_dim: 1024
  device: "cpu"

